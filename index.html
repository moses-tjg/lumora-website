<section id="order" class="order-section">
  <h2>Order Your Lumora 💖</h2>

  <input type="text" placeholder="Your Name">

  <input type="number" id="qty" min="1" value="1" oninput="updateTotal()">

  <p class="total">Total: Rp <span id="total">16000</span></p>

  <!-- KEYCHAIN 1-4 -->
  <h3>Choose Keychain (1–4)</h3>
  <div class="option-grid">
    <label>
      <input type="radio" name="keychainA">
      <img src="1.jpeg">
      <span>Keychain 1</span>
    </label>

    <label>
      <input type="radio" name="keychainA">
      <img src="2.jpeg">
      <span>Keychain 2</span>
    </label>

    <label>
      <input type="radio" name="keychainA">
      <img src="3.jpeg">
      <span>Keychain 3</span>
    </label>

    <label>
      <input type="radio" name="keychainA">
      <img src="4.jpeg">
      <span>Keychain 4</span>
    </label>
  </div>

  <!-- KEYCHAIN 5-6 -->
  <h3>Choose 1 (5–6)</h3>
  <div class="option-grid">
    <label>
      <input type="radio" name="keychainB">
      <img src="5.jpeg">
      <span>Keychain 5</span>
    </label>

    <label>
      <input type="radio" name="keychainB">
      <img src="6.jpeg">
      <span>Keychain 6</span>
    </label>
  </div>

  <!-- ADD BEADS -->
  <h3>Extras</h3>
  <label class="checkbox">
    <input type="checkbox"> Add Beads ✨
  </label>

  <!-- UPLOAD -->
  <label>Upload image for printable design:</label>
  <input type="file">

  <!-- DELIVERY -->
  <h3>Delivery</h3>
  <label class="checkbox">
    <input type="radio" name="delivery"> SBH
  </label>
  <label class="checkbox">
    <input type="radio" name="delivery"> NBH
  </label>

  <textarea placeholder="Custom design details"></textarea>
  <input type="text" placeholder="Your Contact (WA/IG)">

  <button class="submit-btn">Submit Order</button>
</section>
